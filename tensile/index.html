<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tensile Line Calculator | signalOS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0800; }
    input[type=number], input[type=text], select {
      background: rgba(245,240,232,0.05);
      border: 1px solid rgba(180,120,20,0.3);
      color: #f5f0e8;
      padding: 12px 16px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    input[type=number]:focus, input[type=text]:focus, select:focus { border-color: #b8860b; }
    select option { background: #1a1200; color: #f5f0e8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease; }
    ::-webkit-input-placeholder { color: rgba(245,240,232,0.25); }
    ::-moz-placeholder { color: rgba(245,240,232,0.25); }
    a { color: #b8860b; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const INDUSTRY_DATA = {
      "B2B Technology / SaaS": { cpl: { min: 80, avg: 110, max: 140 }, conversionRate: 1.3, conversionSource: "First Page Sage 2025" },
      "Healthcare / Medtech": { cpl: { min: 90, avg: 120, max: 150 }, conversionRate: 5.0, conversionSource: "Ruler Analytics 2026" },
      "Financial Services": { cpl: { min: 70, avg: 100, max: 130 }, conversionRate: 3.0, conversionSource: "First Page Sage 2025" },
      "Media & Communications": { cpl: { min: 50, avg: 75, max: 110 }, conversionRate: 2.5, conversionSource: "Ruler Analytics 2026" },
      "Consumer Goods": { cpl: { min: 25, avg: 40, max: 60 }, conversionRate: 2.4, conversionSource: "Lucky Orange 2025" },
      "Professional Services": { cpl: { min: 80, avg: 115, max: 160 }, conversionRate: 8.0, conversionSource: "SerpSculpt 2025" },
      "Legal": { cpl: { min: 60, avg: 95, max: 140 }, conversionRate: 7.0, conversionSource: "First Page Sage 2025" },
      "Other B2B": { cpl: { min: 50, avg: 85, max: 120 }, conversionRate: 2.5, conversionSource: "Cross-source average 2025" },
    };

    const ACTIVATION_OPTIONS = [
      { label: "In-person dinner or salon", costPerPerson: 60, description: "12 guests, good restaurant" },
      { label: "Workshop or roundtable", costPerPerson: 150, description: "Half-day facilitated session" },
      { label: "Conference or speaking event", costPerPerson: 500, description: "Industry event, travel included" },
      { label: "Printed matter / direct mail", costPerPerson: 25, description: "Zine, broadside, or card" },
      { label: "Custom activation", costPerPerson: null, description: "Enter your own cost" },
    ];

    const ROLE_RATES = {
      "Brand Manager": 65,
      "Content Strategist": 70,
      "Creative Director": 95,
      "Marketing Manager": 75,
      "VP / Senior Leader": 125,
      "Independent Practitioner": 75,
      "Other": 75,
    };

    const SOURCES = [
      { label: "First Page Sage — B2B Conversion Rates by Industry 2025", url: "https://firstpagesage.com/reports/b2b-conversion-rates-by-industry-fc/" },
      { label: "Ruler Analytics — Conversion Rate Benchmarks 2026", url: "https://www.ruleranalytics.com/blog/insight/conversion-rate-by-industry/" },
      { label: "Landbase — Lead Qualification Statistics 2026", url: "https://www.landbase.com/blog/lead-qualification-statistics" },
      { label: "SerpSculpt — B2B Sales Conversion Rate by Industry 2025", url: "https://serpsculpt.com/reports/b2b-sales-conversion-rate-by-industry/" },
      { label: "Flyweel — B2B Lead Generation Benchmark Index 2025", url: "https://www.flyweel.co/blog/lead-gen-cpl-cac-benchmark-index-2025" },
      { label: "RevenueHero — Lead Response Study 2024", url: "https://martal.ca/speed-to-lead-lb/" },
      { label: "AmpiFire — Social Media CPL 2025", url: "https://ampifire.com/blog/average-social-media-cost-per-lead-2025" },
    ];

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      return (
        <button onClick={() => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }}
          style={{ padding: "8px 14px", background: "transparent", border: "1px solid rgba(180,120,20,0.4)", color: "#b8860b", fontSize: "11px", letterSpacing: "0.15em", textTransform: "uppercase", cursor: "pointer", flexShrink: 0, fontFamily: "Georgia, serif" }}
          onMouseOver={e => { e.target.style.background="#b8860b"; e.target.style.color="#0a0800"; }}
          onMouseOut={e => { e.target.style.background="transparent"; e.target.style.color="#b8860b"; }}
        >{copied ? "Copied" : "Copy"}</button>
      );
    }

    function Field({ label, sublabel, children }) {
      return (
        <div style={{ marginBottom: "22px" }}>
          <div style={{ fontSize: "13px", color: "#f5f0e8", marginBottom: "4px" }}>{label}</div>
          {sublabel && <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.4)", marginBottom: "8px" }}>{sublabel}</div>}
          {children}
        </div>
      );
    }

    function ResultBox({ label, value, sublabel, highlight }) {
      return (
        <div style={{ padding: "18px 20px", background: "rgba(180,120,20,0.06)", border: `1px solid ${highlight ? "#b8860b" : "rgba(180,120,20,0.2)"}`, marginBottom: "14px" }}>
          <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "6px" }}>{label}</div>
          <div style={{ fontSize: "30px", color: "#f5f0e8", fontWeight: "normal" }}>{value}</div>
          {sublabel && <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.4)", marginTop: "4px", fontStyle: "italic" }}>{sublabel}</div>}
        </div>
      );
    }

    function StepHeader({ number, title, subtitle }) {
      return (
        <div style={{ borderLeft: "2px solid #b8860b", paddingLeft: "20px", marginBottom: "28px" }}>
          <div style={{ fontSize: "10px", letterSpacing: "0.25em", textTransform: "uppercase", color: "#b8860b", marginBottom: "4px" }}>Step {number} of 4</div>
          <div style={{ fontSize: "22px", color: "#f5f0e8", fontWeight: "normal", marginBottom: "8px" }}>{title}</div>
          {subtitle && <div style={{ fontSize: "13px", color: "rgba(245,240,232,0.5)", lineHeight: "1.6" }}>{subtitle}</div>}
        </div>
      );
    }

    function NavButtons({ onBack, onNext, nextLabel, nextEnabled }) {
      return (
        <div style={{ display: "flex", gap: "12px", marginTop: "32px" }}>
          {onBack && (
            <button onClick={onBack} style={{ flex: 1, padding: "14px", background: "transparent", border: "1px solid rgba(180,120,20,0.25)", color: "rgba(245,240,232,0.4)", fontSize: "12px", letterSpacing: "0.15em", textTransform: "uppercase", cursor: "pointer", fontFamily: "Georgia, serif" }}>Back</button>
          )}
          <button onClick={() => nextEnabled && onNext()}
            style={{ flex: 2, padding: "14px", background: "transparent", border: `1px solid ${nextEnabled ? "#b8860b" : "rgba(180,120,20,0.2)"}`, color: nextEnabled ? "#b8860b" : "rgba(180,120,20,0.3)", fontSize: "12px", letterSpacing: "0.15em", textTransform: "uppercase", cursor: nextEnabled ? "pointer" : "default", fontFamily: "Georgia, serif", transition: "all 0.2s" }}
            onMouseOver={e => { if(nextEnabled) { e.target.style.background="#b8860b"; e.target.style.color="#0a0800"; }}}
            onMouseOut={e => { e.target.style.background="transparent"; e.target.style.color=nextEnabled?"#b8860b":"rgba(180,120,20,0.3)"; }}
          >{nextLabel || "Continue"}</button>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(1);
      const [sourcesOpen, setSourcesOpen] = useState(false);
      const [promptsOpen, setPromptsOpen] = useState(false);
      const [activationCustomCost, setActivationCustomCost] = useState("");

      const [mediaSpend, setMediaSpend] = useState("");
      const [productionCost, setProductionCost] = useState("");
      const [role, setRole] = useState("");
      const [teamHours, setTeamHours] = useState("");
      const [customRate, setCustomRate] = useState("");
      const [engagements, setEngagements] = useState("");
      const [industry, setIndustry] = useState("");
      const [activationType, setActivationType] = useState("");

      const hourlyRate = role === "Other" ? (parseFloat(customRate) || 0) : (ROLE_RATES[role] || 0);
      const timeCost = (parseFloat(teamHours) || 0) * hourlyRate;
      const totalCost = (parseFloat(mediaSpend) || 0) + (parseFloat(productionCost) || 0) + timeCost;
      const trueCPE = parseFloat(engagements) > 0 ? totalCost / parseFloat(engagements) : 0;

      const industryData = INDUSTRY_DATA[industry] || null;
      const estimatedCPL = industryData ? industryData.cpl.avg : 0;
      const conversionRate = industryData ? industryData.conversionRate / 100 : 0;
      const paidCPR = estimatedCPL;

      const selectedActivation = ACTIVATION_OPTIONS.find(a => a.label === activationType);
      // CPAtt — Cost Per Attention. The offline equivalent of CPE: cost per person directly present.
      const activationCPAtt = activationType === "Custom activation"
        ? (parseFloat(activationCustomCost) || 0)
        : (selectedActivation?.costPerPerson || 0);

      const estimatedLeads = estimatedCPL > 0 ? Math.round(totalCost / estimatedCPL) : 0;
      const expectedRelationships = estimatedLeads > 0 ? Math.round(estimatedLeads * (industryData?.conversionRate / 100 || 0)) : 0;
      const activationRelationships = activationCPAtt > 0 ? Math.floor(totalCost / activationCPAtt) : 0;

      // Tensile Line driver: user's actual CPE vs activation CPAtt — both are "cost per unit of attention," paid vs direct
      const getStatus = () => {
        if (!trueCPE || !activationCPAtt) return null;
        const ratio = trueCPE / activationCPAtt;
        if (ratio >= 1.2) return "CROSSED";
        if (ratio >= 0.8) return "APPROACHING";
        return "BELOW";
      };
      const status = getStatus();

      const statusConfig = {
        CROSSED: { color: "#f87171", label: "Hard Tensile Line — Crossed", description: "Your Cost Per Engagement significantly exceeds your activation's Cost Per Attention. The material is under more stress than it can hold." },
        APPROACHING: { color: "#fbbf24", label: "Soft Tensile Line — Approaching", description: "Your CPE is within 20% of your activation's CPAtt. Start planning your activation strategy now before the line firms up." },
        BELOW: { color: "#4ade80", label: "Below the Line", description: "Your CPE is still below your activation's CPAtt. Paid is more efficient for your numbers right now. Revisit this quarterly — CPEs tend to rise as channels saturate." },
      };

      const recommendation = {
        CROSSED: `Redirect a meaningful portion of your next campaign budget toward ${activationType || "in-person activation"}. The math is clear. Start with one event, one city, twelve people.`,
        APPROACHING: `Run one activation experiment alongside your next paid campaign. Compare the cost per relationship in 90 days.`,
        BELOW: `Your paid strategy is still efficient for your industry. Track this quarterly. Platform CPLs rise consistently.`,
      };

      const aiPrompts = status ? [
        { label: "Strategic Reallocation", title: "Help me shift budget toward activation", prompt: `I ran a Tensile Line analysis. My Cost Per Engagement (CPE) is $${trueCPE.toFixed(2)}. Industry: ${industry}. Industry average CPL: $${estimatedCPL}. My chosen activation (${activationType}) has a Cost Per Attention (CPAtt) of $${activationCPAtt}. My Tensile Line status is: ${status}. Help me build a concrete plan to shift budget toward relationship-based activation. Include how to make the case to leadership, what a realistic first activation looks like, and how to measure success in 90 days.` },
        { label: "Leadership Case", title: "Make the case to my leadership team", prompt: `I need to make the case that our paid media spend has crossed a threshold where relationship-based activation delivers better ROI. Numbers: Industry ${industry}. My CPE: $${trueCPE.toFixed(2)}. Industry average CPL: $${estimatedCPL}. My chosen activation (${activationType}) has a Cost Per Attention (CPAtt) of $${activationCPAtt}. Tensile Line status: ${status}. Build a one-page business case connecting these numbers to revenue outcomes. My leadership responds to metrics and ROI, not marketing theory.` },
        { label: "Activation Design", title: `Design my first ${activationType || "activation"}`, prompt: `I want to design my first relationship-based activation. Type: ${activationType}. Industry: ${industry}. Cost Per Attention (CPAtt): $${activationCPAtt}. Expected people reached: ${activationRelationships}. Design the activation in detail — who to invite, what question to organize it around, how to structure the experience, and how to follow up in a way that builds genuine relationships rather than feeding a sales funnel.` },
        { label: "Quarterly Review", title: "Build a Tensile Line review process", prompt: `I want to build a quarterly process to track my Tensile Line. Current: CPE $${trueCPE.toFixed(2)}, Industry ${industry}, Industry CPL $${estimatedCPL}, Activation CPAtt $${activationCPAtt} (${activationType}), Status: ${status}. Design a simple quarterly review — what to measure, what questions to ask, and how to know when my Tensile Line has shifted enough to warrant a budget reallocation.` },
      ] : [];

      const step1Valid = mediaSpend && engagements && role;
      const step2Valid = industry;
      const step4Valid = activationType && (activationType !== "Custom activation" || activationCustomCost);

      const resetAll = () => { setStep(1); setMediaSpend(""); setProductionCost(""); setRole(""); setTeamHours(""); setCustomRate(""); setEngagements(""); setIndustry(""); setActivationType(""); setActivationCustomCost(""); setSourcesOpen(false); setPromptsOpen(false); };

      return (
        <div style={{ minHeight: "100vh", background: "#0a0800", color: "#f5f0e8", fontFamily: "'Georgia', 'Times New Roman', serif" }}>

          <div style={{ borderBottom: "1px solid rgba(180,120,20,0.3)", padding: "20px 40px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{ width: "28px", height: "28px", position: "relative", display: "flex", alignItems: "center", justifyContent: "center" }}>
                {[0,1,2].map(i => <div key={i} style={{ position: "absolute", border: "1.5px solid #c0392b", borderRadius: "50%", width: `${10+i*7}px`, height: `${10+i*7}px`, opacity: 1-i*0.25 }} />)}
                <div style={{ width: "4px", height: "4px", background: "#c0392b", borderRadius: "50%" }} />
              </div>
              <span style={{ fontSize: "13px", letterSpacing: "0.15em", textTransform: "uppercase" }}>signal<span style={{ color: "#c0392b", fontWeight: "bold" }}>OS</span></span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(245,240,232,0.4)" }}>Tensile Line Calculator</span>
              <span style={{ fontSize: "9px", letterSpacing: "0.15em", textTransform: "uppercase", background: "rgba(192,57,43,0.2)", color: "#c0392b", border: "1px solid rgba(192,57,43,0.4)", padding: "2px 6px", borderRadius: "2px" }}>Beta</span>
            </div>
          </div>

          <div style={{ maxWidth: "680px", margin: "0 auto", padding: "52px 40px 80px" }}>

            {step === 1 && (
              <div style={{ marginBottom: "44px" }}>
                <div style={{ fontSize: "11px", letterSpacing: "0.25em", textTransform: "uppercase", color: "#b8860b", marginBottom: "14px" }}>Diagnostic</div>
                <h1 style={{ fontSize: "clamp(28px,4.5vw,46px)", fontWeight: "normal", lineHeight: "1.1", margin: "0 0 16px" }}>Find Your<br /><span style={{ color: "#b8860b" }}>Tensile Line</span></h1>
                <p style={{ fontSize: "15px", lineHeight: "1.7", color: "rgba(245,240,232,0.6)", maxWidth: "480px", marginBottom: "10px" }}>The threshold where your paid marketing strategy requires reevaluation. Find the point where paid reach stops outperforming genuine human presence.</p>
                <div style={{ fontSize: "12px", color: "rgba(245,240,232,0.3)", fontStyle: "italic" }}>Beta — uses industry averages. Approximate where you don't have exact numbers.</div>
              </div>
            )}

            {step <= 4 && (
              <div style={{ display: "flex", gap: "4px", marginBottom: "36px" }}>
                {[1,2,3,4].map(s => <div key={s} style={{ flex: 1, height: "2px", background: s <= step ? "#b8860b" : "rgba(180,120,20,0.2)", transition: "background 0.3s" }} />)}
              </div>
            )}

            {step === 1 && (
              <div className="fade-in">
                <StepHeader number={1} title="Your Cost Per Engagement" subtitle="Let's determine your CPE. These numbers can be approximate — estimate where you don't have the hard numbers." />
                <Field label="Paid media spend" sublabel="Total ad spend for this campaign or time period">
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}><span style={{ color: "#b8860b", fontSize: "16px", flexShrink: 0 }}>$</span><input type="number" value={mediaSpend} onChange={e => setMediaSpend(e.target.value)} placeholder="e.g. 5000" min="0" /></div>
                </Field>
                <Field label="External production costs" sublabel="Agency fees, freelancers, equipment, software — approximate is fine">
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}><span style={{ color: "#b8860b", fontSize: "16px", flexShrink: 0 }}>$</span><input type="number" value={productionCost} onChange={e => setProductionCost(e.target.value)} placeholder="e.g. 2000" min="0" /></div>
                </Field>
                <Field label="Internal team blended rate" sublabel="Estimated hourly cost of your internal team's time">
                  <select value={role} onChange={e => setRole(e.target.value)}>
                    <option value="">Select a rate...</option>
                    {Object.entries(ROLE_RATES).filter(([r]) => r !== "Other").map(([r, rate]) => <option key={r} value={r}>${rate}/hr</option>)}
                    <option value="Other">Custom rate</option>
                  </select>
                </Field>
                {role === "Other" && <Field label="Your custom hourly rate"><div style={{ display: "flex", alignItems: "center", gap: "8px" }}><span style={{ color: "#b8860b", fontSize: "16px", flexShrink: 0 }}>$</span><input type="number" value={customRate} onChange={e => setCustomRate(e.target.value)} placeholder="e.g. 85" min="0" /></div></Field>}
                {role && <Field label="Internal team hours" sublabel={`Total hours your team spent on this campaign — multiplied by $${role === "Other" ? (customRate || "0") : ROLE_RATES[role]}/hr`}><input type="number" value={teamHours} onChange={e => setTeamHours(e.target.value)} placeholder="e.g. 40" min="0" /></Field>}
                <Field label="Total engagements" sublabel="Clicks, views, interactions — whatever you track"><input type="number" value={engagements} onChange={e => setEngagements(e.target.value)} placeholder="e.g. 1200" min="0" /></Field>
                {totalCost > 0 && parseFloat(engagements) > 0 && (
                  <div style={{ padding: "18px 20px", background: "rgba(180,120,20,0.06)", border: "1px solid #b8860b", marginBottom: "8px" }}>
                    <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "6px" }}>Your Estimated CPE</div>
                    <div style={{ fontSize: "34px", color: "#f5f0e8" }}>${trueCPE.toFixed(2)}</div>
                    <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.4)", marginTop: "4px" }}>Total cost ${totalCost.toLocaleString()} (media + external production + internal time) / {parseInt(engagements).toLocaleString()} engagements</div>
                  </div>
                )}
                <NavButtons onNext={() => setStep(2)} nextEnabled={!!step1Valid} nextLabel="Continue to CPL Estimate" />
              </div>
            )}

            {step === 2 && (
              <div className="fade-in">
                <StepHeader number={2} title="Your Estimated Cost Per Lead" subtitle="Let's estimate your CPL. Most brand and content teams don't own this number — we'll use industry benchmarks to calculate it for you." />
                <Field label="Your industry" sublabel="We'll use industry averages to estimate your CPL and conversion rate">
                  <select value={industry} onChange={e => setIndustry(e.target.value)}><option value="">Select your industry...</option>{Object.keys(INDUSTRY_DATA).map(i => <option key={i} value={i}>{i}</option>)}</select>
                </Field>
                {industryData && (
                  <div style={{ border: "1px solid rgba(180,120,20,0.2)", marginBottom: "16px" }}>
                    <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(180,120,20,0.1)" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "12px" }}>Industry CPL Benchmarks</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px" }}>
                        {[["Low", industryData.cpl.min], ["Average", industryData.cpl.avg], ["High", industryData.cpl.max]].map(([label, val]) => (
                          <div key={label}><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "4px", textTransform: "uppercase", letterSpacing: "0.1em" }}>{label}</div><div style={{ fontSize: "24px", color: label === "Average" ? "#b8860b" : "#f5f0e8" }}>${val}</div></div>
                        ))}
                      </div>
                    </div>
                    <div style={{ padding: "16px 20px" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "6px" }}>Industry Conversion Rate</div>
                      <div style={{ fontSize: "24px", color: "#f5f0e8", marginBottom: "4px" }}>{industryData.conversionRate}%</div>
                      <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.35)", fontStyle: "italic" }}>Engagement-to-lead rate for {industry}. Source: {industryData.conversionSource}.</div>
                    </div>
                  </div>
                )}
                <NavButtons onBack={() => setStep(1)} onNext={() => setStep(3)} nextEnabled={!!step2Valid} nextLabel="Continue to Tensile Line" />
              </div>
            )}

            {step === 3 && (
              <div className="fade-in">
                <StepHeader number={3} title="Your Tensile Line" subtitle="Based on your CPE and industry data, here's what your paid media spend is actually costing you per meaningful relationship." />

                <div style={{ border: "1px solid rgba(180,120,20,0.2)", marginBottom: "14px" }}>
                  <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(180,120,20,0.1)" }}>
                    <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "4px" }}>Total Campaign Spend</div>
                    <div style={{ fontSize: "30px", color: "#f5f0e8" }}>${totalCost.toLocaleString()}</div>
                  </div>
                  <div style={{ padding: "16px 20px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px" }}>
                    <div>
                      <div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Paid media</div>
                      <div style={{ fontSize: "18px", color: "#f5f0e8" }}>${(parseFloat(mediaSpend)||0).toLocaleString()}</div>
                    </div>
                    <div>
                      <div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>External production</div>
                      <div style={{ fontSize: "18px", color: "#f5f0e8" }}>${(parseFloat(productionCost)||0).toLocaleString()}</div>
                    </div>
                    <div>
                      <div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Internal team</div>
                      <div style={{ fontSize: "18px", color: "#f5f0e8" }}>${timeCost.toLocaleString()}</div>
                    </div>
                  </div>
                </div>

                <ResultBox label="Your Estimated CPE" value={`$${trueCPE.toFixed(2)}`} sublabel="Total cost including media, external production, and internal team time" />
                <ResultBox label="Your estimated cost per lead (CPL)" value={`$${paidCPR.toFixed(0)}`} sublabel={`${industry} average. Source: Flyweel B2B Benchmark Index 2025. This is the number you're comparing against activation cost.`} highlight={true} />

                <div style={{ padding: "16px 20px", background: "rgba(180,120,20,0.03)", border: "1px solid rgba(180,120,20,0.15)", marginBottom: "20px" }}>
                  <div style={{ fontSize: "12px", lineHeight: "1.7", color: "rgba(245,240,232,0.55)" }}>
                    Your CPE measures what you're already spending to reach people. Your industry's CPL is what the market typically pays to generate a lead — these are two different measurements, not one derived from the other.
                  </div>
                  <div style={{ marginTop: "10px", fontSize: "13px", color: "#f5f0e8" }}>
                    Your CPE of <strong style={{ color: "#b8860b" }}>${trueCPE.toFixed(2)}</strong> is{" "}
                    {trueCPE > paidCPR * 1.1
                      ? <span style={{ color: "#f87171" }}>higher than</span>
                      : trueCPE < paidCPR * 0.9
                        ? <span style={{ color: "#4ade80" }}>lower than</span>
                        : <span style={{ color: "#fbbf24" }}>about the same as</span>}
                    {" "}the {industry} average CPL of <strong style={{ color: "#b8860b" }}>${paidCPR.toFixed(0)}</strong>.
                  </div>
                </div>

                {(() => {
                  const dinnerCPAtt = 60;
                  const dinnerRatio = trueCPE / dinnerCPAtt;
                  const dinnerStatus = dinnerRatio >= 1.2 ? "CROSSED" : dinnerRatio >= 0.8 ? "APPROACHING" : "BELOW";
                  const dinnerColors = { CROSSED: "#f87171", APPROACHING: "#fbbf24", BELOW: "#4ade80" };
                  const dinnerLabels = { CROSSED: "Hard Tensile Line — Crossed", APPROACHING: "Soft Tensile Line — Approaching", BELOW: "Below the Line" };
                  const dinnerDescriptions = {
                    CROSSED: `Your CPE ($${trueCPE.toFixed(2)}) exceeds the Cost Per Attention of a dinner seat ($${dinnerCPAtt}). You've crossed the Tensile Line. The relationship you'd build at dinner compounds. The engagement decays.`,
                    APPROACHING: `Your CPE ($${trueCPE.toFixed(2)}) is close to the Cost Per Attention of a dinner seat ($${dinnerCPAtt}). You're approaching your Tensile Line. Worth running a dinner experiment alongside your next campaign.`,
                    BELOW: `Your CPE ($${trueCPE.toFixed(2)}) is still below the Cost Per Attention of a dinner seat ($${dinnerCPAtt}). You're below the Tensile Line for this activation type. Paid is still more efficient — for now.`,
                  };
                  return (
                    <div style={{ marginBottom: "24px" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "16px" }}>Your Tensile Line — If You Took That Engagement to Dinner Instead</div>
                      <div style={{ padding: "20px", background: "rgba(180,120,20,0.05)", border: `2px solid ${dinnerColors[dinnerStatus]}`, marginBottom: "12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px", flexWrap: "wrap", gap: "8px" }}>
                          <div>
                            <div style={{ fontSize: "16px", letterSpacing: "0.1em", textTransform: "uppercase", color: dinnerColors[dinnerStatus], marginBottom: "8px", fontWeight: "normal" }}>{dinnerLabels[dinnerStatus]}</div>
                            <div style={{ fontSize: "13px", color: "rgba(245,240,232,0.7)", lineHeight: "1.6", maxWidth: "420px" }}>{dinnerDescriptions[dinnerStatus]}</div>
                          </div>
                          <div style={{ textAlign: "right", flexShrink: 0 }}>
                            <div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Dinner CPAtt</div>
                            <div style={{ fontSize: "28px", color: dinnerColors[dinnerStatus] }}>${dinnerCPAtt}</div>
                          </div>
                        </div>
                        <div style={{ borderTop: "1px solid rgba(180,120,20,0.15)", paddingTop: "10px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                          <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Your CPE</div><div style={{ fontSize: "20px", color: "#f87171" }}>${trueCPE.toFixed(2)}</div></div>
                          <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Dinner CPAtt</div><div style={{ fontSize: "20px", color: "#4ade80" }}>${dinnerCPAtt}</div></div>
                        </div>
                      </div>
                      <div style={{ fontSize: "12px", color: "rgba(245,240,232,0.35)", fontStyle: "italic" }}>Dinner Cost Per Attention benchmark: $60/person. CPE is the industry standard for paid — cost per engagement. For activation, we use Cost Per Attention (CPAtt), the offline equivalent: what it costs to be genuinely in front of one person. Directional estimates, not a financial audit.</div>
                    </div>
                  );
                })()}

                <NavButtons onBack={() => setStep(2)} onNext={() => setStep(4)} nextEnabled={true} nextLabel="See your Tensile Line for other activations →" />
              </div>
            )}

            {step === 4 && (
              <div className="fade-in">
                <StepHeader number={4} title="Your Tensile Line for Other Activations" subtitle="Explore how your Tensile Line shifts across different activation options — workshops, printed matter, roundtables, and more." />

                {/* Dinner result carried forward */}
                <div style={{ padding: "16px 20px", background: "rgba(180,120,20,0.04)", border: "1px solid rgba(180,120,20,0.2)", marginBottom: "24px" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "8px" }}>Your baseline — dinner</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px" }}>
                    <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Your CPE</div><div style={{ fontSize: "20px", color: "#f87171" }}>${trueCPE.toFixed(2)}</div></div>
                    <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Dinner CPAtt</div><div style={{ fontSize: "20px", color: "#4ade80" }}>$60</div></div>
                    <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Dinners for budget</div><div style={{ fontSize: "20px", color: "#f5f0e8" }}>{Math.floor(totalCost / 60)}</div></div>
                  </div>
                </div>

                <Field label="Explore another activation type" sublabel="See how your Tensile Line shifts for different options">
                  <select value={activationType} onChange={e => { setActivationType(e.target.value); setActivationCustomCost(""); }}>
                    <option value="">Select activation type...</option>
                    {ACTIVATION_OPTIONS.map(a => <option key={a.label} value={a.label}>{a.label}{a.costPerPerson ? ` (~$${a.costPerPerson}/person)` : ""}</option>)}
                  </select>
                </Field>
                {activationType === "Custom activation" && (
                  <Field label="Cost per person" sublabel="Your estimated cost per attendee or recipient">
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}><span style={{ color: "#b8860b", fontSize: "16px", flexShrink: 0 }}>$</span><input type="number" value={activationCustomCost} onChange={e => setActivationCustomCost(e.target.value)} placeholder="e.g. 80" min="0" /></div>
                  </Field>
                )}
                {activationType && activationCPAtt > 0 && (() => {
                  const ratio = trueCPE / activationCPAtt;
                  const selStatus = ratio >= 1.2 ? "CROSSED" : ratio >= 0.8 ? "APPROACHING" : "BELOW";
                  const selColors = { CROSSED: "#f87171", APPROACHING: "#fbbf24", BELOW: "#4ade80" };
                  const selLabels = { CROSSED: "Hard Tensile Line — Crossed", APPROACHING: "Soft Tensile Line — Approaching", BELOW: "Below the Line" };
                  const selDescriptions = {
                    CROSSED: `Your CPE ($${trueCPE.toFixed(2)}) significantly exceeds the Cost Per Attention of this activation ($${activationCPAtt}). You've crossed the Tensile Line for this option.`,
                    APPROACHING: `Your CPE ($${trueCPE.toFixed(2)}) is close to the Cost Per Attention of this activation ($${activationCPAtt}). Worth testing alongside your next campaign.`,
                    BELOW: `Your CPE ($${trueCPE.toFixed(2)}) is still below the Cost Per Attention of this activation ($${activationCPAtt}). Paid is more efficient for this option — for now.`,
                  };
                  const dinnerCPAtt = 60;
                  const vsDinner = activationCPAtt - dinnerCPAtt;
                  const vsDinnerText = vsDinner === 0
                    ? "Same Cost Per Attention as dinner."
                    : vsDinner < 0
                      ? `$${Math.abs(vsDinner).toFixed(0)} more efficient than dinner per person.`
                      : `$${vsDinner.toFixed(0)} less efficient than dinner per person.`;
                  const vsDinnerColor = vsDinner <= 0 ? "#4ade80" : "#fbbf24";

                  return (
                    <div style={{ marginBottom: "24px" }}>
                      <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", marginBottom: "16px" }}>Your Tensile Line — If You Chose {activationType}</div>
                      <div style={{ padding: "20px", background: "rgba(180,120,20,0.05)", border: `2px solid ${selColors[selStatus]}`, marginBottom: "12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px", flexWrap: "wrap", gap: "8px" }}>
                          <div>
                            <div style={{ fontSize: "16px", letterSpacing: "0.1em", textTransform: "uppercase", color: selColors[selStatus], marginBottom: "8px", fontWeight: "normal" }}>{selLabels[selStatus]}</div>
                            <div style={{ fontSize: "13px", color: "rgba(245,240,232,0.7)", lineHeight: "1.6", maxWidth: "420px" }}>{selDescriptions[selStatus]}</div>
                          </div>
                          <div style={{ textAlign: "right", flexShrink: 0 }}>
                            <div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Activation CPAtt</div>
                            <div style={{ fontSize: "28px", color: selColors[selStatus] }}>${activationCPAtt}</div>
                          </div>
                        </div>
                        <div style={{ borderTop: "1px solid rgba(180,120,20,0.15)", paddingTop: "10px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "10px" }}>
                          <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Your CPE</div><div style={{ fontSize: "20px", color: "#f87171" }}>${trueCPE.toFixed(2)}</div></div>
                          <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "2px", textTransform: "uppercase", letterSpacing: "0.1em" }}>{activationType} CPAtt</div><div style={{ fontSize: "20px", color: selColors[selStatus] }}>${activationCPAtt}</div></div>
                        </div>
                        <div style={{ borderTop: "1px solid rgba(180,120,20,0.15)", paddingTop: "10px" }}>
                          <div style={{ fontSize: "12px", color: vsDinnerColor }}>vs. Dinner ($60 CPAtt): {vsDinnerText}</div>
                        </div>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", padding: "16px 20px", background: "rgba(180,120,20,0.03)", border: "1px solid rgba(180,120,20,0.15)", marginBottom: "8px" }}>
                        <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "4px", textTransform: "uppercase", letterSpacing: "0.1em" }}>People reached for ${totalCost.toLocaleString()}</div><div style={{ fontSize: "24px", color: "#f5f0e8" }}>{activationRelationships}</div></div>
                        <div><div style={{ fontSize: "10px", color: "rgba(245,240,232,0.4)", marginBottom: "4px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Relationships via paid</div><div style={{ fontSize: "24px", color: "#f87171" }}>{expectedRelationships}</div></div>
                      </div>
                      <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.3)", fontStyle: "italic" }}>
                        CPE is the industry standard for paid media — cost per engagement. CPAtt (Cost Per Attention) is the offline equivalent — what it costs to be genuinely in front of one person. "Relationships via paid" = estimated leads ({estimatedLeads}) × {industry} engagement-to-lead conversion rate ({industryData?.conversionRate}%, {industryData?.conversionSource}). "People reached" via activation assumes every attendee or recipient is a direct relationship.
                      </div>
                    </div>
                  );
                })()}
                <NavButtons onBack={() => setStep(3)} onNext={() => setStep(5)} nextEnabled={!!step4Valid} nextLabel="See my Tensile Line status" />
              </div>
            )}

            {step === 5 && status && (
              <div className="fade-in">
                <div style={{ borderTop: "1px solid rgba(180,120,20,0.3)", borderBottom: "1px solid rgba(180,120,20,0.3)", padding: "40px 0", marginBottom: "36px", textAlign: "center" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "0.25em", textTransform: "uppercase", color: "rgba(245,240,232,0.4)", marginBottom: "16px" }}>Your Tensile Line Status</div>
                  <div style={{ fontSize: "22px", letterSpacing: "0.05em", textTransform: "uppercase", color: statusConfig[status].color, marginBottom: "16px", fontWeight: "normal" }}>{statusConfig[status].label}</div>
                  <div style={{ fontSize: "14px", color: "rgba(245,240,232,0.6)", maxWidth: "420px", margin: "0 auto", lineHeight: "1.6" }}>{statusConfig[status].description}</div>
                </div>

                <div style={{ marginBottom: "32px" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "0.25em", textTransform: "uppercase", color: "#b8860b", marginBottom: "6px" }}>Your Numbers</div>
                  <div style={{ fontSize: "12px", color: "rgba(245,240,232,0.4)", marginBottom: "16px" }}>Paid media compared against your selected activation: <strong style={{ color: "#f5f0e8" }}>{activationType}</strong></div>
                  <div style={{ border: "1px solid rgba(180,120,20,0.2)" }}>
                    {[
                      ["Cost Per Engagement vs. Cost Per Attention", `$${trueCPE.toFixed(2)}`, `$${activationCPAtt}`],
                      ["Estimated CPL (industry context)", `$${estimatedCPL}`, "—"],
                      ["Reach from this budget", `${estimatedLeads} leads`, `${activationRelationships} people`],
                      ["Estimated relationships", `${expectedRelationships}`, `${activationRelationships}`],
                    ].map(([label, paid, activation], i) => (
                      <div key={i} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", borderBottom: i < 3 ? "1px solid rgba(180,120,20,0.1)" : "none" }}>
                        <div style={{ padding: "12px 16px", fontSize: "12px", color: "rgba(245,240,232,0.55)", borderRight: "1px solid rgba(180,120,20,0.1)" }}>{label}</div>
                        <div style={{ padding: "12px 16px", fontSize: "13px", color: "#f5f0e8", textAlign: "center", borderRight: "1px solid rgba(180,120,20,0.1)" }}>
                          <div style={{ fontSize: "9px", color: "rgba(245,240,232,0.3)", marginBottom: "2px", textTransform: "uppercase" }}>Paid</div>{paid}
                        </div>
                        <div style={{ padding: "12px 16px", fontSize: "13px", color: activation !== "—" ? "#b8860b" : "rgba(245,240,232,0.3)", textAlign: "center" }}>
                          <div style={{ fontSize: "9px", color: "rgba(245,240,232,0.3)", marginBottom: "2px", textTransform: "uppercase" }}>{activationType || "Activation"}</div>{activation}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: "11px", color: "rgba(245,240,232,0.3)", fontStyle: "italic", marginTop: "8px", lineHeight: "1.6" }}>
                    "Estimated relationships" applies your industry's engagement-to-lead conversion rate ({industryData?.conversionRate}%, {industryData?.conversionSource}) to your estimated leads. For {activationType}, every person reached is counted as a direct relationship.
                  </div>
                </div>

                <div style={{ padding: "20px", background: "rgba(180,120,20,0.05)", border: `1px solid ${statusConfig[status].color}44`, marginBottom: "28px" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "0.2em", textTransform: "uppercase", color: statusConfig[status].color, marginBottom: "8px" }}>Recommended Action</div>
                  <p style={{ fontSize: "14px", lineHeight: "1.7", color: "rgba(245,240,232,0.75)", margin: 0 }}>{recommendation[status]}</p>
                </div>

                <div style={{ marginBottom: "28px", border: "1px solid rgba(180,120,20,0.2)" }}>
                  <button onClick={() => setPromptsOpen(!promptsOpen)} style={{ width: "100%", padding: "18px 20px", background: "transparent", border: "none", color: "#f5f0e8", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
                    <div><div style={{ fontSize: "11px", letterSpacing: "0.25em", textTransform: "uppercase", color: "#b8860b", marginBottom: "4px" }}>Go Deeper</div><div style={{ fontSize: "15px" }}>AI Prompts for Further Analysis</div><div style={{ fontSize: "11px", color: "rgba(245,240,232,0.4)", marginTop: "2px" }}>4 prompts tailored to your numbers</div></div>
                    <span style={{ color: "#b8860b", fontSize: "16px", marginLeft: "16px", flexShrink: 0, transform: promptsOpen ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>→</span>
                  </button>
                  {promptsOpen && (
                    <div style={{ borderTop: "1px solid rgba(180,120,20,0.2)", padding: "18px", display: "flex", flexDirection: "column", gap: "12px" }}>
                      <p style={{ fontSize: "12px", color: "rgba(245,240,232,0.4)", lineHeight: "1.6" }}>Copy any prompt and paste into Claude, ChatGPT, or your AI tool of choice.</p>
                      {aiPrompts.map((p, i) => (
                        <div key={i} style={{ padding: "14px", border: "1px solid rgba(180,120,20,0.15)", background: "rgba(180,120,20,0.02)" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "8px", gap: "12px" }}>
                            <div><span style={{ fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#b8860b", display: "block", marginBottom: "2px" }}>{p.label}</span><span style={{ fontSize: "13px", color: "#f5f0e8" }}>{p.title}</span></div>
                            <CopyButton text={p.prompt} />
                          </div>
                          <div style={{ fontSize: "11px", lineHeight: "1.6", color: "rgba(245,240,232,0.3)", fontStyle: "italic", borderTop: "1px solid rgba(180,120,20,0.08)", paddingTop: "8px" }}>{p.prompt.substring(0, 130)}...</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div style={{ marginBottom: "28px", border: "1px solid rgba(180,120,20,0.15)" }}>
                  <button onClick={() => setSourcesOpen(!sourcesOpen)} style={{ width: "100%", padding: "16px 20px", background: "transparent", border: "none", color: "rgba(245,240,232,0.5)", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left", fontSize: "12px" }}>
                    <span>Data Sources & Methodology</span>
                    <span style={{ color: "rgba(245,240,232,0.3)", transform: sourcesOpen ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>→</span>
                  </button>
                  {sourcesOpen && (
                    <div style={{ borderTop: "1px solid rgba(180,120,20,0.12)", padding: "18px" }}>
                      <p style={{ fontSize: "12px", color: "rgba(245,240,232,0.4)", lineHeight: "1.6", marginBottom: "14px" }}>All calculations use industry averages. Your specific CPL, conversion rates, and costs will vary. This tool helps you think differently about marketing spend — not replace your own data.</p>
                      {SOURCES.map((s, i) => <div key={i} style={{ marginBottom: "8px" }}><a href={s.url} target="_blank" style={{ fontSize: "12px", color: "#b8860b", textDecoration: "none", lineHeight: "1.5" }}>{s.label} →</a></div>)}
                    </div>
                  )}
                </div>

                <div style={{ padding: "18px 20px", background: "rgba(180,120,20,0.04)", border: "1px solid rgba(180,120,20,0.12)", fontSize: "13px", lineHeight: "1.7", color: "rgba(245,240,232,0.4)", fontStyle: "italic", marginBottom: "28px" }}>
                  The Tensile Line isn't a fixed number. It moves as your CPLs rise, your conversion rates shift, and your activation strategy matures. Revisit this quarterly.
                  <div style={{ marginTop: "8px", fontStyle: "normal", fontSize: "11px", letterSpacing: "0.1em" }}>— signalOS, signal-os.co</div>
                </div>

                <div style={{ borderTop: "1px solid rgba(180,120,20,0.3)", paddingTop: "32px", textAlign: "center" }}>
                  <div style={{ fontSize: "11px", letterSpacing: "0.25em", textTransform: "uppercase", color: "#b8860b", marginBottom: "12px" }}>Go Further</div>
                  <p style={{ fontSize: "14px", color: "rgba(245,240,232,0.6)", lineHeight: "1.6", margin: "0 0 20px", maxWidth: "400px", marginLeft: "auto", marginRight: "auto" }}>signalOS goes deeper on brand strategy and operating experience every two weeks. Written from inside, not outside. Free.</p>
                  <a href="https://signal-os.co" target="_blank" style={{ display: "inline-block", padding: "14px 32px", background: "transparent", border: "1px solid #b8860b", color: "#b8860b", fontSize: "12px", letterSpacing: "0.2em", textTransform: "uppercase", textDecoration: "none" }}
                    onMouseOver={e => { e.target.style.background="#b8860b"; e.target.style.color="#0a0800"; }}
                    onMouseOut={e => { e.target.style.background="transparent"; e.target.style.color="#b8860b"; }}
                  >Subscribe Free →</a>
                  <div style={{ marginTop: "10px", fontSize: "11px", color: "rgba(245,240,232,0.2)" }}>No spam. Unsubscribe anytime. One post every two weeks.</div>
                </div>

                <div style={{ textAlign: "center", marginTop: "24px" }}>
                  <button onClick={resetAll} style={{ background: "transparent", border: "none", color: "rgba(245,240,232,0.25)", fontSize: "12px", cursor: "pointer", textDecoration: "underline", fontFamily: "Georgia, serif" }}>Start over</button>
                </div>

              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
